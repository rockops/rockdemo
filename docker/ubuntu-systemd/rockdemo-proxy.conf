# rockDemo: give this daemon the host's HTTP(S)_PROXY / NO_PROXY. The values are
# written at boot by rockdemo-proxy.service (lifted from PID 1's environment,
# where rockDemo's `docker run -e` values live) — systemd would otherwise start
# the daemon with a clean env and never see them. The leading '-' makes the file
# optional, so the daemon still starts when no proxy is configured (empty file).
# COPYed into both containerd.service.d/ and docker.service.d/ by the Dockerfile.
[Service]
EnvironmentFile=-/run/rockdemo/proxy.env
