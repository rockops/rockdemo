# Pin cgroup v2 controller delegation via systemd's own accounting. In a
# private cgroup namespace the container's root `cgroup.subtree_control` starts
# empty and systemd only keeps a controller enabled for children while some unit
# claims it — so a nested kubelet's repeated (re)start churn (each failed start
# removes kubepods.slice) makes systemd reconcile and strip the controllers,
# and the kubelet can never recover ("kubepods has some missing controllers").
# Enabling accounting makes systemd itself require cpu/memory/io/pids on every
# cgroup, so they stay delegated permanently regardless of churn.
[Manager]
DefaultCPUAccounting=yes
DefaultMemoryAccounting=yes
DefaultIOAccounting=yes
DefaultTasksAccounting=yes
