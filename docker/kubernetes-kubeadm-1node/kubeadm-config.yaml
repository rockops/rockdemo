# kubeadm init configuration for the single-node container cluster.
# - criSocket: use containerd (started by the entrypoint).
# - podSubnet: matches the baked flannel manifest (10.244.0.0/16).
# - KubeletConfiguration: cgroupfs driver (no systemd) + don't fail on swap.
apiVersion: kubeadm.k8s.io/v1beta4
kind: InitConfiguration
nodeRegistration:
  criSocket: unix:///run/containerd/containerd.sock
---
apiVersion: kubeadm.k8s.io/v1beta4
kind: ClusterConfiguration
networking:
  podSubnet: 10.244.0.0/16
---
apiVersion: kubelet.config.k8s.io/v1beta1
kind: KubeletConfiguration
cgroupDriver: cgroupfs
failSwapOn: false
