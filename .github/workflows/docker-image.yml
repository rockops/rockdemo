name: Docker images

# Build the rockDemo backend images and publish them to the GitHub Container
# Registry (GHCR). GHCR auth uses the built-in GITHUB_TOKEN, so there are no
# secrets to configure. Published images are:
#   ghcr.io/<owner>/rockdemo/<name>:24.04  (and :latest)
# which are the imageids referenced by config/backends.json.

on:
  push:
    branches: [main]
    paths:
      - docker/ubuntu/**
      - docker/ubuntu-systemd/**
      - docker/kubernetes-kubeadm-1node/**
      - .github/workflows/docker-image.yml
  workflow_dispatch: # allow manual rebuilds from the Actions tab

permissions:
  contents: read
  packages: write # needed to push to GHCR

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # `dir` is the build context under docker/; `name` is the GHCR repo path.
        include:
          - { dir: ubuntu, name: ubuntu }
          - { dir: ubuntu-systemd, name: ubuntu-systemd }
          # FROM ghcr.io/<owner>/rockdemo/ubuntu-systemd:24.04 — relies on a
          # previously-published base image (rebuild base first if both change).
          - { dir: kubernetes-kubeadm-1node, name: kubernetes-kubeadm-1node }
    steps:
      - uses: actions/checkout@v5

      # GHCR image names must be lowercase; the owner ("rockops") already is,
      # but lowercasing keeps this correct for forks under any-cased orgs.
      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/rockdemo/${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/${{ matrix.dir }}
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:24.04
            ${{ steps.img.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
