name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # No build step (the extension is plain JS) — packaging is the build check.
      - name: Package extension (.vsix)
        run: npx --yes @vscode/vsce package -o rockdemo.vsix
      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: rockdemo.vsix
